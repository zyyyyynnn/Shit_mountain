<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Shit Mountain — executable anti-pattern reserve</title>
  <desc id="desc">A dark editorial illustration of a layered code mountain with topographic lines, code fragments, and a warning placard.</desc>

