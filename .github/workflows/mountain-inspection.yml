name: Mountain Stability Inspection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect-the-pile:
    name: 检查这坨还能不能跑
    runs-on: ubuntu-latest

    steps:
      - name: 搬运整座山
        uses: actions/checkout@v4

      - name: 安装 JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 检查山体稳定性与指数漂移
        shell: bash
        run: |
          set -o pipefail
          bash scripts/validate.sh 2>&1 | tee validation.log

      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log
          retention-days: 3
