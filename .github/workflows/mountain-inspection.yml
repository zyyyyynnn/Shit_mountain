name: Mountain Stability Inspection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect-the-pile:
    name: 检查这坨还能不能跑 (${{ matrix.runtime.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: minimum
            java: '17'
            python: '3.10'
          - name: current
            java: '21'
            python: '3.12'

    steps:
      - name: 搬运整座山
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 安装 JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: ${{ matrix.runtime.java }}

      - name: 安装 Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.runtime.python }}

      - name: 检查山体稳定性与指数漂移
        shell: bash
        run: |
          set -o pipefail
          bash scripts/validate.sh 2>&1 | tee validation.log

      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-log-${{ matrix.runtime.name }}
          path: validation.log
          retention-days: 3
