name: Mountain Stability Inspection

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect-the-pile:
    name: 检查这坨还能不能跑 (${{ matrix.runtime.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - name: minimum
            java: '17'
            python: '3.10'
          - name: current
            java: '21'
            python: '3.12'

    steps:
      - name: 搬运整座山
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: 安装 JDK
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4.8.0
        with:
          distribution: temurin
          java-version: ${{ matrix.runtime.java }}

      - name: 安装 Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.runtime.python }}

      - name: 检查山体稳定性与指数漂移
        shell: bash
        run: |
          set -o pipefail
          bash scripts/validate.sh 2>&1 | tee validation.log

      - name: 保存失败诊断
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: validation-log-${{ matrix.runtime.name }}
          path: validation.log
          retention-days: 3
