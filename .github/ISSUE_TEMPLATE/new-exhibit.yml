name: "申请新增展品"
description: "提交一项可复现、可解释的软件工程反模式"
title: "[展品] "
body:
  - type: markdown
    attributes:
      value: |
        感谢向屎山保护区捐赠地质样本。请描述真实的工程问题，不要只提交随机乱码或冒犯性命名。

  - type: input
    id: exhibit-name
    attributes:
      label: 展品名称
      placeholder: "例如：十八层 if-else 火山"
    validations:
      required: true

  - type: dropdown
    id: language
    attributes:
      label: 语言地质层
      options:
        - Java
        - Python
        - 其他（需要新增检查器与 SMI 适配器）
    validations:
      required: true

  - type: dropdown
    id: contract
    attributes:
      label: 行为合同类型
      description: 修复前后应该保持一致、明确不同，还是坏版预期失败？
      options:
        - equal-output
        - expected-difference
        - expected-failure
        - 尚未确定
    validations:
      required: true

  - type: textarea
    id: scene
    attributes:
      label: 案发现场
      description: 代码原本想解决什么问题？输入、输出和约束是什么？
      placeholder: "业务背景、输入输出、现有限制……"
    validations:
      required: true

  - type: textarea
    id: smell
    attributes:
      label: 主要气味
      description: 具体包含哪些代码异味或反模式？
      placeholder: "嵌套过深、魔法数字、字符串类型系统……"
    validations:
      required: true

  - type: textarea
    id: explosion
    attributes:
      label: 它会怎么炸？
      description: 哪类需求变化最容易让问题失控？
    validations:
      required: true

  - type: textarea
    id: contract-output
    attributes:
      label: 预期行为
      description: 给出坏版与修复版的入口、输出或失败诊断。
      placeholder: "bad=... / fixed=... / expected failure contains ..."
    validations:
      required: true

  - type: textarea
    id: shovel
    attributes:
      label: 铲屎路线
      description: 建议如何逐步重构？需要保留哪些行为？
    validations:
      required: true

  - type: checkboxes
    id: safety
    attributes:
      label: 入山安检
      options:
        - label: 不包含真实密钥、个人信息或第三方私有代码
          required: true
        - label: 不包含恶意载荷、资源消耗攻击、网络探测或破坏性命令
          required: true
        - label: 我愿意补充 `exhibit.json`、可运行示例和明确的复现步骤
          required: true
